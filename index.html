<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1688 Link Converter</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --accent-color: #ff5500; /* 1688 Orange */
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #fff;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
            margin-bottom: 16px;
            resize: vertical;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        textarea:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-color);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #e04b00;
        }

        .result-box {
            margin-top: 24px;
            padding: 16px;
            background-color: #252525;
            border-radius: 8px;
            border: 1px dashed #444;
            display: none;
            text-align: left;
        }

        .result-box.active {
            display: block;
        }

        .result-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 6px;
        }

        .output-link {
            word-break: break-all;
            font-size: 14px;
            color: #fff;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            display: block;
            margin-bottom: 12px;
            user-select: all;
        }

        .copy-btn {
            background-color: #444;
            font-size: 14px;
            padding: 8px;
        }

        .copy-btn:hover {
            background-color: #555;
        }

        .status {
            font-size: 14px;
            margin-top: 10px;
            color: #ffdd00;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>1688 Link Cleaner</h1>
    <p>Paste the entire app message below. The tool will automatically extract, clean, and convert the URL for CNfans.</p>
    
    <textarea id="inputText" placeholder="Paste the whole message here...&#10;e.g., 7另 %aD3dxxx %达 .hTtp://qr.1688.com/..."></textarea>
    <button onclick="processAndConvert()">Clean & Convert</button>
    
    <div id="statusMessage" class="status"></div>

    <div id="resultContainer" class="result-box">
        <div class="result-label">CNfans Ready Mobile Link:</div>
        <span id="outputUrl" class="output-link"></span>
        <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>
</div>

<script>
async function processAndConvert() {
    const input = document.getElementById('inputText').value.trim();
    const statusDiv = document.getElementById('statusMessage');
    const resultContainer = document.getElementById('resultContainer');

    statusDiv.innerText = "";
    resultContainer.classList.remove('active');

    if (!input) {
        statusDiv.innerText = "❌ Input is empty.";
        return;
    }

    // REGEX MAGIC: This scans the entire block of text and finds anything starting with http:// or https://
    const urlRegex = /(https?:\/\/[^\s]+)/gi;
    const match = input.match(urlRegex);

    if (!match) {
        statusDiv.innerText = "❌ No link found inside the text. Make sure it contains a 1688 URL.";
        return;
    }

    // This is our isolated URL link completely free of Chinese characters and emojis
    let cleanUrl = match[0];

    if (!cleanUrl.includes('1688.com')) {
        statusDiv.innerText = "❌ Found a link, but it doesn't look like a 1688.com URL.";
        return;
    }

    // Check if the link is already resolved (has an ID instead of a QR token)
    if (cleanUrl.includes('offer/') || cleanUrl.includes('id=')) {
        let itemId = cleanUrl.match(/(?:offer\/|id=)(\d+)/);
        if (itemId && itemId[1]) {
            showResult(`https://m.1688.com/offer/${itemId[1]}.html`);
            statusDiv.innerText = "✅ Extracted and formatted successfully!";
            return;
        }
    }

    statusDiv.innerText = "🔄 Found QR Link! Resolving encrypted token...";

    try {
        // Use proxy to catch the 302/301 tracking redirect from qr.1688.com
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(cleanUrl);
        const response = await fetch(proxyUrl);
        const finalUrl = response.url;
        
        // Match the true item digits
        const idMatch = finalUrl.match(/(?:offer\/|id=)(\d+)/);

        if (idMatch && idMatch[1]) {
            const cleanMobileUrl = `https://m.1688.com/offer/${idMatch[1]}.html`;
            statusDiv.innerText = "✅ Successfully converted!";
            showResult(cleanMobileUrl);
        } else {
            // Fallback checking the response contents if the redirect is cloaked
            const textData = await response.text();
            const fallbackMatch = textData.match(/(?:offer\/|id=)(\d+)/);
            if (fallbackMatch && fallbackMatch[1]) {
                showResult(`https://m.1688.com/offer/${fallbackMatch[1]}.html`);
                statusDiv.innerText = "✅ Successfully converted!";
            } else {
                statusDiv.innerText = "❌ Extracted the link, but couldn't decode the Item ID. 1688 might be blocking the proxy.";
            }
        }
    } catch (error) {
        statusDiv.innerText = "❌ Connection failed. Try copying just the link out manually into a browser tab.";
        console.error(error);
    }
}

function showResult(url) {
    const resultContainer = document.getElementById('resultContainer');
    const outputSpan = document.getElementById('outputUrl');
    outputSpan.innerText = url;
    resultContainer.classList.add('active');
}

function copyToClipboard() {
    const text = document.getElementById('outputUrl').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert("Link copied! Ready to paste into CNfans.");
    });
}
</script>

</body>
</html>
