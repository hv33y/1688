<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1688 Link Converter</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --accent-color: #ff5500; /* 1688 Orange tint */
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #fff;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-color);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #e04b00;
        }

        .result-box {
            margin-top: 24px;
            padding: 16px;
            background-color: #252525;
            border-radius: 8px;
            border: 1px dashed #444;
            display: none;
            text-align: left;
        }

        .result-box.active {
            display: block;
        }

        .result-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 6px;
        }

        .output-link {
            word-break: break-all;
            font-size: 14px;
            color: #fff;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            display: block;
            margin-bottom: 12px;
        }

        .copy-btn {
            background-color: #444;
            font-size: 14px;
            padding: 8px;
        }

        .copy-btn:hover {
            background-color: #555;
        }

        .status {
            font-size: 14px;
            margin-top: 10px;
            color: #ffdd00;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>1688 QR Link Fixer</h1>
    <p>Convert encrypted qr.1688.com app links into clean mobile links for CNfans</p>
    
    <input type="text" id="inputUrl" placeholder="Paste your https://qr.1688.com/... link here" autocomplete="off">
    <button onclick="convertLink()">Convert Link</button>
    
    <div id="statusMessage" class="status"></div>

    <div id="resultContainer" class="result-box">
        <div class="result-label">CNfans Ready Mobile Link:</div>
        <span id="outputUrl" class="output-link"></span>
        <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>
</div>

<script>
async function convertLink() {
    const input = document.getElementById('inputUrl').value.trim();
    const statusDiv = document.getElementById('statusMessage');
    const resultContainer = document.getElementById('resultContainer');
    const outputSpan = document.getElementById('outputUrl');

    statusDiv.innerText = "";
    resultContainer.classList.remove('active');

    if (!input.includes('1688.com')) {
        statusDiv.innerText = "❌ Please enter a valid 1688 link.";
        return;
    }

    // If it's already a clean m.1688 or detail.1688 link, output it back
    if (input.includes('offer/') || input.includes('id=')) {
        let itemId = input.match(/(?:offer\/|id=)(\d+)/);
        if (itemId && itemId[1]) {
            showResult(`https://m.1688.com/offer/${itemId[1]}.html`);
            return;
        }
    }

    statusDiv.innerText = "🔄 Resolving encrypted token...";

    try {
        // We use a free, public CORS proxy to look through the 1688 shortlink redirect header safely in the browser.
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(input);
        const response = await fetch(proxyUrl);
        
        // Grab the final destination URL text
        const finalUrl = response.url;
        
        // Extract the target product numerical ID using regex
        const idMatch = finalUrl.match(/(?:offer\/|id=)(\d+)/);

        if (idMatch && idMatch[1]) {
            const cleanMobileUrl = `https://m.1688.com/offer/${idMatch[1]}.html`;
            statusDiv.innerText = "✅ Successfully converted!";
            showResult(cleanMobileUrl);
        } else {
            // Backup parsing method if the proxy strips response.url properties
            const textData = await response.text();
            const fallbackMatch = textData.match(/(?:offer\/|id=)(\d+)/);
            if (fallbackMatch && fallbackMatch[1]) {
                showResult(`https://m.1688.com/offer/${fallbackMatch[1]}.html`);
                statusDiv.innerText = "✅ Successfully converted!";
            } else {
                statusDiv.innerText = "❌ Could not extract Product ID. Try manually opening the link in a browser first.";
            }
        }
    } catch (error) {
        statusDiv.innerText = "❌ Network error. Try pasting the URL into a standard browser tab first to let it redirect, then copy that final address.";
        console.error(error);
    }
}

function showResult(url) {
    const resultContainer = document.getElementById('resultContainer');
    const outputSpan = document.getElementById('outputUrl');
    outputSpan.innerText = url;
    resultContainer.classList.add('active');
}

function copyToClipboard() {
    const text = document.getElementById('outputUrl').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert("Link copied! Paste it straight into CNfans.");
    });
}
</script>

</body>
</html>
